defaults:
  - _self_

paths:
  video_root: data/inference_ready
  output_dir: experiments/outputs/mimicmotion_output
  log_file: experiments/logs/mimicmotion_log.log

inference:
  resolution: 512
  sample_stride: 2
  fps: 7
  seed: 42
  num_frames: 16
  frames_overlap: 4
  noise_aug_strength: 0.02
  num_inference_steps: 25
  guidance_scale: 2.5

system:
  use_float16: true

runtime:
  device: cuda